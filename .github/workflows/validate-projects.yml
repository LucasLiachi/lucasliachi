name: Validate Projects Index

on:
  pull_request:
    paths:
      - 'src/scripts/**'
      - 'Projects/**'
      - 'scripts/**'
      - 'static/projects-index.json'
      - '.github/workflows/validate-projects.yml'
  push:
    branches:
      - main
    paths:
      - 'src/scripts/**'
      - 'Projects/**'
      - 'scripts/**'
      - 'static/projects-index.json'
      - '.github/workflows/validate-projects.yml'

permissions:
  contents: write

jobs:
  validate-projects:
    name: Validate paths and regenerate index
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate project paths
        run: node scripts/validate-projects.js

      - name: Regenerate projects index
        run: node scripts/generate-index.js

      - name: Commit generated projects index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update generated projects index [skip ci]'
          file_pattern: static/projects-index.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
