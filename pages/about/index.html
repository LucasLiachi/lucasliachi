  <style>
    .about-section {
      margin-bottom: 3rem;
    }

    .about-section h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--foreground);
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
    }

    /* Cards da biblioteca — coluna única */
    .academic-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .academic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .academic-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: var(--accent);
    }

    .academic-card-body {
      flex: 1;
      min-width: 0;
    }

    .academic-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--foreground);
      margin: 0 0 0.25rem;
    }

    .academic-card-section {
      font-size: 0.8rem;
      color: var(--muted-foreground);
      margin: 0 0 0.5rem;
    }

    .academic-card-desc {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      margin: 0;
      line-height: 1.5;
    }

    .academic-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .academic-pill {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* Tipo de formação */
    .pill-graduacao     { background: #dbeafe; color: #1e40af; }
    .pill-posgraduacao  { background: #f3e8ff; color: #6b21a8; }
    .pill-mba           { background: #dcfce7; color: #166534; }
    .pill-tecnico       { background: #fef9c3; color: #854d0e; }

    .academic-card-link {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }

    .academic-card-link:hover {
      text-decoration: underline;
    }

    .pill-especializacao { background: #fce7f3; color: #9d174d; }
  </style>
</head>

  <script>
    (function () {
      // ── Carrega perfil Markdown ──
      async function loadProfile() {
        var lang = (window.currentLanguage || localStorage.getItem('language') || 'en').toUpperCase();
        var candidates = [
          '../../pages/about/' + lang + '.md',
          '../../pages/about/EN.md'
        ];
        var container = document.getElementById('about-profile');
        if (!container) return;
        for (var i = 0; i < candidates.length; i++) {
          try {
            var r = await fetch(candidates[i]);
            if (!r.ok) continue;
            var text = await r.text();
            if (window.marked) container.innerHTML = window.marked.parse(text);
            return;
          } catch (_) {}
        }
      }

      // ── Carrega cards do histórico acadêmico ──
      async function loadAcademic() {
        var lang = (window.currentLanguage || localStorage.getItem('language') || 'en').toLowerCase();
        var list = document.getElementById('about-academic-list');
        if (!list) return;
        try {
          var r = await fetch('../../data/academico.json');
          if (!r.ok) throw new Error();
          var items = await r.json();
          list.innerHTML = '';
          items.forEach(function (item) {
            var instituicao = (item.instituicao && (item.instituicao[lang] || item.instituicao.en)) || '';
            var grau        = (item.grau && (item.grau[lang] || item.grau.en)) || '';
            var desc        = (item.descricao && (item.descricao[lang] || item.descricao.en)) || '';
            var tipo        = (item.tipo || '');
            var tipoClass   = tipo.replace(/[áàâãä]/g,'a').replace(/[éèêë]/g,'e')
                                  .replace(/[íìîï]/g,'i').replace(/[óòôõö]/g,'o')
                                  .replace(/[úùûü]/g,'u').replace(/ç/g,'c').replace(/-/g,'');

            var card = document.createElement('div');
            card.className = 'academic-card';

            var body = document.createElement('div');
            body.className = 'academic-card-body';

            var h3 = document.createElement('h3');
            h3.className = 'academic-card-title';
            h3.textContent = grau;
            body.appendChild(h3);

            var inst = document.createElement('p');
            inst.className = 'academic-card-section';
            inst.textContent = instituicao + (item.periodo ? '  ·  ' + item.periodo : '');
            body.appendChild(inst);

            var descP = document.createElement('p');
            descP.className = 'academic-card-desc';
            descP.textContent = desc;
            body.appendChild(descP);

            var footer = document.createElement('div');
            footer.className = 'academic-card-footer';

            var tipoPill = document.createElement('span');
            tipoPill.className = 'academic-pill pill-' + tipoClass;
            tipoPill.textContent = tipo;
            footer.appendChild(tipoPill);

            if (item.certificado) {
              var certLink = document.createElement('a');
              certLink.className = 'academic-card-link';
              certLink.href = '../../' + item.certificado;
              certLink.target = '_blank';
              certLink.rel = 'noopener noreferrer';
              certLink.textContent = (window.Translations && window.Translations.get('pages.about.academic.viewMaterial')) || 'View certificate';
              footer.appendChild(certLink);
            }

            body.appendChild(footer);
            card.appendChild(body);
            list.appendChild(card);
          });
        } catch (_) {
          if (list) {
            list.innerHTML = '<p>Unable to load academic profile.</p>';
          }
        }
      }

      loadProfile();
      loadAcademic();

      document.addEventListener('languageChanged', function () {
        loadProfile();
        loadAcademic();
      });
    })();
  </script>
