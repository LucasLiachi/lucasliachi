  <script>
    (function () {
      var _currentLang = null;

      function getPeriodLabel(entry) {
        var lang = (window.currentLanguage || localStorage.getItem('language') || 'en').toLowerCase();
        var presentLabel = lang === 'pt' ? 'Presente' : lang === 'es' ? 'Presente' : 'Present';
        return entry.end ? (entry.start + ' — ' + entry.end) : (entry.start + ' — ' + presentLabel);
      }

      function buildTimelineHTML(entries) {
        return entries.map(function (entry, index) {
          var period = getPeriodLabel(entry);
          var side = entry.side || (index % 2 === 0 ? 'right' : 'left');

          var techPills = entry.technologies.map(function (t) {
            var span = document.createElement('span');
            span.className = 'jt-tech-pill';
            span.textContent = t;
            return span.outerHTML;
          }).join('');

          var highlights = entry.highlights.map(function (h) {
            var li = document.createElement('li');
            li.textContent = h;
            return li.outerHTML;
          }).join('');

          var periodEl = document.createElement('div');
          periodEl.className = 'jt-period';
          periodEl.textContent = period;

          var roleEl = document.createElement('h3');
          roleEl.className = 'jt-role';
          roleEl.textContent = entry.role;

          var companyEl = document.createElement('p');
          companyEl.className = 'jt-company';
          companyEl.textContent = entry.company;

          var card = '<div class="jt-card">'
            + periodEl.outerHTML
            + roleEl.outerHTML
            + companyEl.outerHTML
            + '<ul class="jt-highlights">' + highlights + '</ul>'
            + '<div class="jt-tech">' + techPills + '</div>'
            + '</div>';

          return '<div class="jt-item ' + side + '" style="animation-delay:' + (index * 0.07) + 's">'
            + '<div class="jt-marker" aria-hidden="true"></div>'
            + card
            + '</div>';
        }).join('');
      }

      async function renderTimeline() {
        var container = document.getElementById('career-json-timeline');
        if (!container) return;

        container.setAttribute('aria-busy', 'true');
        container.innerHTML = '<div class="career-loading">' + (window.Translations && window.Translations.get('pages.career.loading') || 'Loading timeline...') + '</div>';

        try {
          var res = await fetch('../../data/carreira.json');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          var entries = await res.json();

          var wrapper = document.createElement('div');
          wrapper.className = 'jt-timeline';
          wrapper.innerHTML = buildTimelineHTML(entries);
          container.innerHTML = '';
          container.appendChild(wrapper);
        } catch (err) {
          var lang = (window.currentLanguage || localStorage.getItem('language') || 'en').toLowerCase();
          var msg = lang === 'pt'
            ? 'Não foi possível carregar a linha do tempo.'
            : lang === 'es'
            ? 'No se pudo cargar la línea de tiempo.'
            : 'Unable to load career timeline.';
          var p = document.createElement('p');
          p.className = 'career-loading error';
          p.textContent = msg;
          container.innerHTML = '';
          container.appendChild(p);
        } finally {
          container.removeAttribute('aria-busy');
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        _currentLang = window.currentLanguage || localStorage.getItem('language') || 'en';
        renderTimeline();
      });

      document.addEventListener('languageChanged', function () {
        var newLang = window.currentLanguage || localStorage.getItem('language') || 'en';
        if (newLang !== _currentLang) {
          _currentLang = newLang;
          renderTimeline();
        }
      });
    })();
  </script>
